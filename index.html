<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Girish Kharat</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #000000, #1c1c1c);
      color: #e0e0e0;
      text-align: center;
    }

    header {
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid #444;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 16px;
      color: #aaa;
    }

    .profile {
      margin-top: 25px;
    }

    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      border: 2px solid #555;
    }

    .card {
      margin: 25px auto;
      width: 80%;
      max-width: 700px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      border: 1px solid #333;
    }

    h2 {
      margin-bottom: 10px;
      color: #ffffff;
    }

    .quote {
      margin-top: 10px;
      font-style: italic;
      color: #bbb;
    }

    .projects {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .project {
      background: #111;
      color: white;
      width: 220px;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #333;
      transition: 0.3s;
    }

    .project:hover {
      transform: scale(1.05);
      border-color: #888;
    }

    .project img {
      width: 100%;
      border-radius: 5px;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <h1>Girish Kharat 🖤</h1>
  <p class="tagline">Reader 📚 | Gamer 🎮</p>
</header>

<div class="profile">
  <img src="https://via.placeholder.com/150" alt="Profile Photo">
</div>

<div class="card">
  <h2>My Interests</h2>
  <p>I enjoy reading books and playing games in my free time.</p>

  <div class="quote">
    <p>"Books and games take me to different worlds."</p>
  </div>
</div>

<div class="card">
  <h2>My Projects</h2>

  <div class="projects">
    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>VR Headset</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Wind Propelled Car</h3>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/200">
      <h3>Neon LED Structure</h3>
    </div>
  </div>

</div>

<footer>
  <p>📚 Calm Mind | 🎮 Fun Time | Summer Camp Project</p>
</footer>

</body>
</html>
